# geapTimes — Stage 4 side-by-side comparison configuration.
# Mirrors base_config.yaml (same data/forecast/covariates -> same slug-named prepped/train/infer
# tables) with three deltas for the managed-pipeline comparison run:
#   1. all three backends enabled (TimesFM + BQML + AutoML), AutoML at the floor budget;
#   2. execution.target: cloud_pipeline;
#   3. shares experiment_name citibike-daily-baseline so runs are comparable across stages.
# base_config.yaml stays the cheap default (AutoML disabled); this is the explicit live-comparison.

project:
  id: ${GCP_PROJECT} # required; provided via environment
  region: us-central1
  bq_location: US
  gcs_bucket: geaptimes-${GCP_PROJECT}
  bq_dataset: geaptimes

data:
  trips_table: bigquery-public-data.new_york_citibike.citibike_trips
  stations_table: bigquery-public-data.new_york.citibike_stations
  weather_dataset: bigquery-public-data.noaa_gsod

  series_column: start_station_name
  time_column: date
  target_column: num_trips

  source_table_name: citibike_daily_source
  prepped_table_name: citibike_daily_prepped

  station_filter:
    top_n: 25

  date_range:
    start: null
    end: null

  gap_fill: true

  weather:
    station_usaf: "725030"
    station_wban: "14732"

  splits:
    granularity: DAY
    test_length: 14
    validate_length: 14

  covariates:
    time_series_attribute_columns: [capacity, region_id, latitude, longitude]
    available_at_forecast_columns: [temp, prcp, day_of_week, month, is_weekend]
    unavailable_at_forecast_columns: [avg_tripduration, pct_subscriber, ratio_gender]

  holiday_region: US

forecast:
  frequency: D
  horizon: 14

models:
  - name: timesfm
    enabled: true
    params:
      type: timesfm
      checkpoint: google/timesfm-2.5-200m-pytorch
      max_context: 1024
      context_len: 512
      use_covariates: false
      quantiles: true

  - name: bqml_arima_xreg
    enabled: true
    params:
      type: bqml
      model_type: ARIMA_PLUS_XREG
      use_covariates: true

  - name: automl
    enabled: true # comparison includes AutoML this stage
    params:
      type: automl
      optimization_objective: minimize-quantile-loss
      context_window: 28
      budget_milli_node_hours: 1000 # floor budget (1 node-hour); keeps the live run cheap

execution:
  target: cloud_pipeline
  experiment_name: citibike-daily-baseline

doe:
  axes: {}

pipeline:
  pipeline_root: null
  image:
    repo: geaptimes
    image_name: geaptimes-runtime
    image_tag: latest
    location: null
  serving:
    mode: endpoint
    keep_deployed: false
    machine_type: n1-standard-4
    min_replica_count: 1
    max_replica_count: 1
    batch_machine_type: n1-standard-4
    batch_starting_replica_count: 1
    batch_max_replica_count: 1
  component_machine_type: e2-standard-2
  enable_caching: true
