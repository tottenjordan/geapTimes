# Build + push the geapTimes runtime image to Artifact Registry.
#
# Run from the repo root (the build context is the whole repo so the Dockerfile can COPY pyproject /
# src / README):
#
#   gcloud builds submit --config src/geaptimes/pipelines/container/cloudbuild.yaml \
#       --substitutions=_REGION=us-central1,_REPO=geaptimes,_IMAGE=geaptimes-runtime,_TAG=latest .
#
# The target Artifact Registry repo must exist first (labelled solution=geaptimes):
#   uv run python scripts/setup_gcp.py --config config/comparison_config.yaml
#
# torch (CPU) + the baked TimesFM checkpoint make this a large, slow build — hence the bigger
# machine, disk, and timeout below.
substitutions:
  _REGION: us-central1
  _REPO: geaptimes
  _IMAGE: geaptimes-runtime
  _TAG: latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - src/geaptimes/pipelines/container/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${_TAG}
      - .

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${_TAG}

options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100

timeout: 3600s
