# Pre-commit hooks for geapTimes. Portable across `pre-commit` and `prek`.
#
# Activate (one-time, per clone):  uv run pre-commit install
# Run on demand:                   uv run pre-commit run --all-files
#
# NOTE: defining hooks here does NOT install them — the git hook is only wired
# up after `pre-commit install` is run. See docs/notes.

repos:
  # Ruff: lint + format (rev kept in sync with the pinned ruff in pyproject.toml)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Core file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  # Secret scanning: fails on any new high-entropy string / credential not in the baseline.
  # Refresh the baseline with:  uv run detect-secrets scan > .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # --- Dormant security linters --------------------------------------------------------------
  # These have nothing to lint today (no shell scripts, no .github/workflows/), so they no-op.
  # They are wired and pinned so they fire the moment a matching target is added — no config
  # scramble at the point a shell script or GitHub Actions workflow first lands.

  # Shell script linting (fires when *.sh / shebang'd shell files appear).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # GitHub Actions workflow linting (fires when .github/workflows/*.yml appear).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # GitHub Actions security auditing (fires when .github/workflows/*.yml appear).
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
